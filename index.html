<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>April 25th — The Perfect Date</title>
    <meta
      name="description"
      content="April 25th. Because it's not too hot, not too cold. All you need is a light jacket. A weather map of the perfect date, every year since 1930."
    />
    <link rel="stylesheet" href="./css/pico.min.css" />
    <link rel="stylesheet" href="./css/app.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧥</text></svg>"
    />
  </head>
  <body x-data="april25">
    <header>
      <hgroup>
        <h1>I’d have to say April 25th.</h1>
        <p>
          Because it’s not too hot, not too cold.<br />
          All you need is a
          <a
            href="https://youtu.be/-RYkqs_dxQE?si=d7XBqhuR25n-zaTH&amp;t=66"
            target="_blank"
            rel="noopener"
            >light&nbsp;jacket</a
          >.
        </p>
      </hgroup>
    </header>

    <main id="map-wrap" :aria-busy="loading ? 'true' : 'false'">
      <canvas id="globe"></canvas>
      <aside
        id="history-panel"
        x-show="panel.show"
        x-cloak
        @keydown.escape.window="panel.show = false"
        @pointerdown.outside="panel.show = false"
      >
        <button
          class="close"
          aria-label="Close"
          @click="panel.show = false"
        >
          ×
        </button>
        <h3 x-text="panel.title"></h3>
        <p class="summary" x-text="panel.summary"></p>
        <p class="detail" x-text="panel.detail"></p>
        <div id="history-chart"></div>
        <p class="note" x-text="panel.note"></p>
      </aside>
      <div
        id="tooltip"
        x-show="tooltip.show"
        x-html="tooltip.html"
        :style="`left:${tooltip.x}px;top:${tooltip.y}px`"
      ></div>
    </main>

    <footer id="controls">
      <div id="legend">
        <span><i class="swatch cold"></i> too cold</span>
        <span><i class="swatch jacket"></i> light jacket</span>
        <span><i class="swatch hot"></i> too hot</span>
        <span><i class="swatch unknown"></i> no data</span>
      </div>
      <input
        type="range"
        min="1930"
        max="2025"
        step="1"
        x-model.number="year"
        @input="onYearInput"
        aria-label="Year"
      />
      <output>
        April 25th, <b x-text="year"></b> ·
        <span x-text="stationCount.toLocaleString()"></span> stations
      </output>
    </footer>

    <script src="./js/d3.v7.min.js"></script>
    <script src="./js/topojson-client.min.js"></script>
    <script src="./js/plot.min.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/alpine.min.js" defer></script>
  </body>
</html>
